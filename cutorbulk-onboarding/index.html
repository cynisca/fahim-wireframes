<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CutOrBulk — Onboarding Flow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #09090f; color: #ffffff; padding: 2rem; }
        header { max-width: 1200px; margin: 0 auto 2rem; }
        h1 { font-size: 2rem; color: #B5FF00; margin-bottom: 0.25rem; }
        p.subtitle { color: rgba(255,255,255,0.5); margin-bottom: 0.5rem; }
        p.back a { color: #ff2d78; text-decoration: none; font-size: 0.9rem; }
        p.back a:hover { text-decoration: underline; }
        .grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.5rem; }
        .card { background: #12121a; border-radius: 16px; padding: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.06); }
        .card img { width: 100%; height: auto; border-radius: 10px; display: block; }
        .card h2 { font-size: 0.95rem; margin-top: 0.75rem; color: #ffffff; font-weight: 500; }
        .card .step { color: #09090f; background: #B5FF00; display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <header>
        <p class="back"><a href="../">&larr; All wireframes</a></p>
        <h1>CutOrBulk — Onboarding Flow</h1>
        <p class="subtitle">9 screens · captured on iPhone 16 Pro · 2026-04-14</p>
    </header>

    <div class="grid">
        <div class="card"><span class="step">1</span><img src="01-splash.png" alt="Splash"><h2>Splash — Rate my body</h2></div>
        <div class="card"><span class="step">2</span><img src="02-referral.png" alt="Referral"><h2>Referral code</h2></div>
        <div class="card"><span class="step">3</span><img src="03-gender.png" alt="Gender"><h2>Gender</h2></div>
        <div class="card"><span class="step">4</span><img src="04-progress.png" alt="Progress"><h2>Progress preview</h2></div>
        <div class="card"><span class="step">5</span><img src="05-ranking.png" alt="Ranking"><h2>Ranking preview</h2></div>
        <div class="card"><span class="step">6</span><img src="06-photo-capture.png" alt="Photo capture"><h2>Photo capture</h2></div>
        <div class="card"><span class="step">7</span><img src="07-photo-confirm.png" alt="Photo confirm"><h2>Photo confirm</h2></div>
        <div class="card"><span class="step">8</span><img src="08-analyzing.png" alt="Analyzing"><h2>Analyzing</h2></div>
        <div class="card"><span class="step">9</span><img src="09-paywall.png" alt="Paywall"><h2>Paywall (Superwall)</h2></div>
    </div>
</body>
</html>
